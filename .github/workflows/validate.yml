name: validate-openspec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: openspec validate --strict
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Show OpenSpec version
        run: openspec --version

      - name: Stage reference change into openspec/changes
        run: cp -r examples/select-admin-frontend-stack openspec/changes/

      - name: Validate reference change (strict)
        run: openspec validate select-admin-frontend-stack --strict

      - name: Show status
        run: openspec status --change select-admin-frontend-stack

      - name: Assert error-path scenario coverage (AGENTS §2)
        shell: bash
        run: |
          SPEC=openspec/changes/select-admin-frontend-stack/specs/admin-frontend-stack/spec.md
          REQ_COUNT=$(grep -c "^### Requirement:" "$SPEC")
          ERR_COUNT=$(grep -c "^#### Scenario: \[異常\]" "$SPEC")
          echo "Requirements: $REQ_COUNT"
          echo "Error-path scenarios: $ERR_COUNT"
          if [ "$ERR_COUNT" -lt "$REQ_COUNT" ]; then
            echo "::error::Each Requirement MUST have at least one [異常] error-path scenario. Got $ERR_COUNT errors for $REQ_COUNT requirements."
            exit 1
          fi

      - name: Assert adversarial-review audit trail in proposal.md (AGENTS §8.1)
        shell: bash
        run: |
          PROPOSAL=openspec/changes/select-admin-frontend-stack/proposal.md
          if ! grep -q "對抗性審查來源:" "$PROPOSAL"; then
            echo "::error::$PROPOSAL lacks '對抗性審查來源:' line. Required by AGENTS §8.1 (proposal adversarial-review audit trail)."
            exit 1
          fi
          if grep -qE "對抗性審查來源: *無 *\(理由: *(不需要|N/A|無)? *\)" "$PROPOSAL"; then
            echo "::error::Vague rationale for skipping adversarial review. Be specific about why Codex was not consulted on the proposal."
            exit 1
          fi
          echo "Adversarial-review audit trail present: $(grep '對抗性審查來源:' "$PROPOSAL")"

      - name: Assert Codex audit trail in design.md (AGENTS §8.2)
        shell: bash
        run: |
          DESIGN=openspec/changes/select-admin-frontend-stack/design.md
          if grep -q "^## Decisions" "$DESIGN"; then
            if ! grep -q "第二意見來源:" "$DESIGN"; then
              echo "::error::$DESIGN has '## Decisions' but lacks '第二意見來源:' line. Required by AGENTS §8.2 (Codex audit trail)."
              exit 1
            fi
            # Reject the empty rationale form
            if grep -qE "第二意見來源: *無 *\(理由: *(不需要|N/A|無)? *\)" "$DESIGN"; then
              echo "::error::Vague rationale for skipping second opinion. Be specific about why Codex was not consulted."
              exit 1
            fi
            echo "Codex audit trail present: $(grep '第二意見來源:' "$DESIGN")"
          fi

      - name: Assert completeness-review audit trail in spec.md (AGENTS §8.3)
        shell: bash
        run: |
          fail=0
          while IFS= read -r spec; do
            if ! grep -q "完備性審查來源:" "$spec"; then
              echo "::error::$spec lacks '完備性審查來源:' line. Required by AGENTS §8.3 (spec completeness-review audit trail)."
              fail=1
            elif grep -qE "完備性審查來源: *無 *\(理由: *(不需要|N/A|無)? *\)" "$spec"; then
              echo "::error::$spec has vague '完備性審查來源: 無 (理由: ...)' — must be specific."
              fail=1
            else
              echo "Completeness-review audit trail present in $spec: $(grep -m1 '完備性審查來源:' "$spec")"
            fi
          done < <(find openspec/changes/select-admin-frontend-stack/specs -name "spec.md")
          exit $fail

      - name: Assert approved-by on specs (AGENTS §7)
        shell: bash
        run: |
          fail=0
          while IFS= read -r spec; do
            if ! grep -q "approved-by:" "$spec"; then
              echo "::error::$spec lacks 'approved-by:' marker. Required by AGENTS §7 (Spec → Code human review gate)."
              fail=1
            else
              echo "approved-by present in $spec: $(grep -m1 'approved-by:' "$spec")"
            fi
          done < <(find openspec/changes/select-admin-frontend-stack/specs -name "spec.md")
          exit $fail

      - name: Assert verified-by on tasks.md (AGENTS §6)
        shell: bash
        run: |
          TASKS=openspec/changes/select-admin-frontend-stack/tasks.md
          TOTAL=$(grep -cE "^- \[[ x]\] " "$TASKS")
          ANNOTATED=$(grep -cE "^- \[[ x]\] .*→ verified by:" "$TASKS")
          echo "Total tasks: $TOTAL"
          echo "Annotated with → verified by:: $ANNOTATED"
          if [ "$TOTAL" != "$ANNOTATED" ]; then
            MISSING=$((TOTAL - ANNOTATED))
            echo "::error::$MISSING task line(s) lack '→ verified by:' annotation. Required by AGENTS §6 (Task writing rules)."
            grep -nE "^- \[[ x]\] " "$TASKS" | grep -vE "→ verified by:" || true
            exit 1
          fi

      - name: Run starter unit + integration tests (scripts/test.sh)
        shell: bash
        run: |
          # Unstage the reference change first so test.sh's bootstrap test
          # starts from a clean state (it re-stages internally).
          rm -rf openspec/changes/select-admin-frontend-stack
          chmod +x scripts/test.sh
          bash scripts/test.sh
